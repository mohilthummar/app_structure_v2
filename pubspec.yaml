name: app_structure
description: "Project structure for Flutter App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.7.2
  get_storage: ^2.1.1

  # Network Connection
  dio: ^5.8.0+1
  http_parser: ^4.0.2
  connectivity_plus: ^6.1.0
  pretty_dio_logger: ^1.4.0

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Utils
  intl: ^0.20.2
  crypto: ^3.0.3
  shimmer: ^3.0.0
  animations: ^2.0.11
  fluttertoast: ^8.2.4
  url_launcher: ^6.2.5
  flutter_svg: ^2.0.10+1
  pin_code_fields: ^8.0.1
  cupertino_icons: ^1.0.8
  dropdown_button2: ^2.3.9
  device_info_plus: ^11.3.0
  cached_network_image: ^3.4.1

  # Image of File picker
  image_picker: ^1.1.2
  file_picker: 8.2.0
  permission_handler: ^11.4.0
  path_provider: ^2.1.5
  image_cropper: ^9.1.0

  # Firebase
  firebase_core: ^3.15.1
  firebase_messaging: ^15.2.9
  flutter_local_notifications: ^19.3.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
    # - assets/json/
    # - assets/lottie/
    # - assets/video/
    # - assets/audio/
    # - assets/pdf/
    # - assets/excel/

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Light.ttf
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Medium.ttf
        - asset: assets/fonts/OpenSans-SemiBold.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
        - asset: assets/fonts/OpenSans-ExtraBold.ttf


